map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    server_name litsoftware.io.vn;
    client_max_body_size 50M;

    # Cấu hình bảo mật nâng cao
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Các REST APIs của VPS-WARD v2 (Dự án mới)
    location /api/v1/ {
        proxy_pass http://127.0.0.1:28080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Ngăn chặn cache các cuộc gọi API Next.js từ phía proxy trung gian
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    # Trang chủ trỏ trực tiếp về thư mục tĩnh Next.js đã export của Portal (Tải nhanh, tốn 0MB RAM)
    location / {
        root /root/projects/LIT-SOFTWARE/frontend/out;
        try_files $uri $uri.html $uri/ /index.html;
        
        # Ép trình duyệt và proxy trung gian luôn tải mã nguồn mới nhất
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/litsoftware.io.vn/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/litsoftware.io.vn/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = litsoftware.io.vn) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name litsoftware.io.vn;
    return 404; # managed by Certbot
}
